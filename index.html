<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#06040f" />

    <title>Chúc mừng sinh nhật Gia Hân</title>
    <meta
      name="description"
      content="Hành trình hai năm đầu đời của Nguyễn Ngọc Gia Hân, từ ngày con chào đời 16/07/2024."
    />

    <!-- Thẻ hiển thị khi gửi link qua Zalo / Messenger / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Chúc mừng sinh nhật Gia Hân" />
    <meta
      property="og:description"
      content="Có một ngôi sao rơi xuống thế gian và trở thành con gái của bố mẹ."
    />
    <!-- Ảnh hiện trong khung xem trước phải là đường dẫn tuyệt đối.
         Đặt file ảnh vào public/photos/og-cover-v2.jpg là xong. -->
    <meta property="og:url" content="https://kimduan.github.io/hanchan/" />
    <meta property="og:image" content="https://kimduan.github.io/hanchan/photos/og-cover-v2.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Nguyễn Ngọc Gia Hân — Chúc mừng sinh nhật" />
    <meta property="og:site_name" content="Sinh nhật Gia Hân" />

    <!-- Thẻ Twitter/X, một số app chat cũng đọc bộ này -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Chúc mừng sinh nhật Gia Hân" />
    <meta
      name="twitter:description"
      content="Có một ngôi sao rơi xuống thế gian và trở thành con gái của bố mẹ."
    />
    <meta name="twitter:image" content="https://kimduan.github.io/hanchan/photos/og-cover-v2.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
